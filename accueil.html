<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyProcess FTTH</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --or:#f60;--orh:#e55;--orbg:#fff5ee;--orbd:#ffd5b5;
  --bl:#2563eb;--blbg:#eff6ff;--blbd:#bfdbfe;
  --gn:#16a34a;--gnbg:#f0fdf4;--gnbd:#bbf7d0;
  --ye:#ca8a04;--yebg:#fefce8;--yebd:#fde68a;
  --re:#dc2626;--rebg:#fef2f2;--rebd:#fecaca;
  --g0:#fff;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;
  --g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;
  --g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --r:10px;--rs:7px;--sh:0 1px 3px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f2f4f7;color:var(--g800);font-size:14px;line-height:1.6}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid var(--g200);padding:.75rem 1.25rem;display:flex;align-items:center;gap:.875rem;position:sticky;top:0;z-index:300;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:.5rem;cursor:pointer}
.lmark{background:var(--or);color:#fff;width:30px;height:30px;border-radius:7px;display:grid;place-items:center;font-size:.95rem;flex-shrink:0}
.lname{font-weight:700;font-size:.9rem;color:var(--g900);letter-spacing:-.02em}
.lname span{color:var(--or)}
.hsep{width:1px;height:18px;background:var(--g200)}
.hbadge{background:var(--orbg);color:var(--or);border:1px solid var(--orbd);border-radius:20px;padding:.15rem .6rem;font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.hclock{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--g400)}

/* ── LAYOUT ── */
.wrap{display:flex;min-height:calc(100vh - 53px)}

/* ── SIDEBAR ── */
.sb{width:220px;background:#fff;border-right:1px solid var(--g200);padding:1rem .75rem;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;flex-shrink:0}
.sb-sec{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--g400);padding:.2rem .5rem;margin:.875rem 0 .3rem}
.sb-sec:first-child{margin-top:0}
.ni{display:flex;align-items:center;gap:.45rem;padding:.42rem .55rem;border-radius:var(--rs);cursor:pointer;font-size:.78rem;color:var(--g600);transition:.1s;border:1px solid transparent;white-space:nowrap}
.ni:hover{background:var(--g50);color:var(--g800)}
.ni.on{background:var(--orbg);border-color:var(--orbd);color:var(--or);font-weight:600}
.ni-ic{font-size:.75rem;width:15px;text-align:center;flex-shrink:0}
.sd{border:none;border-top:1px solid var(--g100);margin:.4rem 0}

/* ── MAIN ── */
.main{flex:1;padding:1.5rem;overflow-y:auto}

/* ── PAGE HEADER ── */
.ph{margin-bottom:1.25rem}
.ph-title{font-size:1.2rem;font-weight:700;color:var(--g900);letter-spacing:-.02em}
.ph-sub{font-size:.78rem;color:var(--g500);margin-top:.15rem}

/* ── CARDS GRID ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem}

/* ── GENERIC CARD ── */
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:1.125rem}
.card-h{font-weight:700;font-size:.85rem;color:var(--g800);margin-bottom:.625rem;display:flex;align-items:center;gap:.4rem}
.card-h span{font-size:.9rem}

/* ── ACCUEIL ── */
.welcome{background:linear-gradient(135deg,var(--or) 0%,#ff8533 100%);border-radius:var(--r);padding:1.375rem 1.5rem;color:#fff;margin-bottom:1rem}
.wt{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
.ws{font-size:.8rem;opacity:.9;line-height:1.6}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
.qcard{background:#fff;border:1.5px solid var(--g200);border-radius:var(--r);padding:.875rem .875rem;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:.3rem}
.qcard:hover{border-color:var(--or);box-shadow:0 3px 12px rgba(255,102,0,.1);transform:translateY(-2px)}
.qe{font-size:1.25rem}
.qn{font-weight:700;font-size:.82rem;color:var(--g800)}
.qd{font-size:.72rem;color:var(--g500)}
.qtag{display:inline-block;margin-top:.1rem;background:var(--g100);color:var(--g500);padding:.08rem .45rem;border-radius:20px;font-size:.62rem;font-weight:600}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.icard{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:.875rem 1rem}
.ic-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.15rem .5rem;border-radius:4px;margin-bottom:.5rem}
.ic-badge.or{background:var(--orbg);color:var(--or)}
.ic-badge.bl{background:var(--blbg);color:var(--bl)}
.ic-badge.gn{background:var(--gnbg);color:var(--gn)}
.ic-badge.ye{background:var(--yebg);color:var(--ye)}
.ic-badge.re{background:var(--rebg);color:var(--re)}
.ic-t{font-weight:700;font-size:.82rem;color:var(--g800);margin-bottom:.3rem}
.ic-rows .r{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;padding:.3rem 0;border-bottom:1px solid var(--g100);font-size:.78rem}
.ic-rows .r:last-child{border:none}
.ic-rows .r .lbl{color:var(--g600)}
.ic-rows .r .val{font-weight:600;color:var(--g800);text-align:right;font-family:'JetBrains Mono',monospace;font-size:.73rem}
.ic-rows .r .val.or{color:var(--or)}
.ic-rows .r .val.gn{color:var(--gn)}
.ic-rows .r .val.re{color:var(--re)}
.voyants-ref{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.vref{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:.875rem 1rem}
.vref-t{font-weight:700;font-size:.8rem;color:var(--g800);margin-bottom:.5rem;display:flex;align-items:center;gap:.3rem}
.vlist .vi{display:flex;align-items:center;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--g100);font-size:.76rem}
.vlist .vi:last-child{border:none}
.vlist .vi .vn{color:var(--g600)}
.vdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem;flex-shrink:0}
.vdot.on{background:var(--gn)}
.vdot.off{background:var(--g300)}
.vdot.blink{background:var(--bl);animation:blk .8s ease infinite alternate}
.vdot.red{background:var(--re)}
@keyframes blk{to{opacity:.2}}
.vs{font-size:.7rem;font-weight:600}
.vs.ok{color:var(--gn)}
.vs.ko{color:var(--g400)}
.vs.bl{color:var(--bl)}
.vs.red{color:var(--re)}

/* ── DÉLAIS PAGE ── */
.delais-intro{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.delais-intro p{font-size:.82rem;color:var(--g600);line-height:1.7}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1rem}
.dcard{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:1rem 1.125rem}
.dcard-h{font-weight:700;font-size:.82rem;color:var(--g800);margin-bottom:.625rem;padding-bottom:.5rem;border-bottom:2px solid var(--g100);display:flex;align-items:center;gap:.4rem}
.dcard-h.or{border-color:var(--or)}
.dcard-h.bl{border-color:var(--bl)}
.dtable{width:100%;border-collapse:collapse;font-size:.76rem}
.dtable th{text-align:left;color:var(--g400);font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;padding:.3rem .2rem;border-bottom:1px solid var(--g200)}
.dtable td{padding:.4rem .2rem;border-bottom:1px solid var(--g100);color:var(--g700);vertical-align:top}
.dtable tr:last-child td{border:none}
.dtable .d{font-weight:700;font-family:'JetBrains Mono',monospace}
.dtable .d.or{color:var(--or)}
.dtable .d.bl{color:var(--bl)}
.dtable .d.gn{color:var(--gn)}
.dtable .d.re{color:var(--re)}
.dtable .d.ye{color:var(--ye)}
.files-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:1rem}
.fcard{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:.75rem .875rem}
.fcard-t{font-weight:700;font-size:.75rem;color:var(--g800);margin-bottom:.35rem;font-family:'JetBrains Mono',monospace}
.fcard-d{font-size:.72rem;color:var(--g500);line-height:1.5}
.fcard-dl{display:inline-block;margin-top:.3rem;font-size:.7rem;font-weight:700;padding:.1rem .4rem;border-radius:3px}
.fcard-dl.or{background:var(--orbg);color:var(--or)}
.fcard-dl.bl{background:var(--blbg);color:var(--bl)}
.fcard-dl.re{background:var(--rebg);color:var(--re)}
.fcard-dl.gn{background:var(--gnbg);color:var(--gn)}
.tip-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.tip{background:#fff;border:1px solid var(--g200);border-left:3px solid var(--or);border-radius:var(--r);padding:.75rem 1rem;font-size:.78rem;color:var(--g600);line-height:1.6}
.tip strong{color:var(--g800)}

/* ── DIAGNOSTIC ── */
.prog-wrap{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:.875rem 1.125rem;margin-bottom:1rem;display:none}
.prog-wrap.show{display:block}
.pm{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:.4rem}
.pl{color:var(--g600);font-weight:500}
.pp{color:var(--or);font-weight:700;font-family:'JetBrains Mono',monospace}
.pt{height:4px;background:var(--g100);border-radius:10px;overflow:hidden;margin-bottom:.5rem}
.pf{height:100%;background:linear-gradient(90deg,var(--or),#ff8533);border-radius:10px;width:0%;transition:width .3s ease}
.pdots{display:flex;gap:3px}
.pdot{flex:1;height:3px;border-radius:10px;background:var(--g100)}
.pdot.done{background:var(--or)}
.pdot.cur{background:#ffb380}
.diag-cat-intro{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.diag-cat-t{font-weight:700;font-size:.88rem;color:var(--g800);margin-bottom:.25rem}
.diag-cat-s{font-size:.78rem;color:var(--g500)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.ccard{background:#fff;border:1.5px solid var(--g200);border-radius:var(--r);padding:1rem;cursor:pointer;transition:.15s}
.ccard:hover{border-color:var(--or);box-shadow:0 3px 12px rgba(255,102,0,.08);transform:translateY(-2px)}
.ce{font-size:1.3rem;margin-bottom:.4rem;display:block}
.cn{font-weight:700;font-size:.82rem;color:var(--g800);margin-bottom:.15rem}
.cd{font-size:.72rem;color:var(--g500)}
.ctag{display:inline-block;margin-top:.35rem;background:var(--g100);color:var(--g500);padding:.08rem .45rem;border-radius:20px;font-size:.62rem;font-weight:600}
.step-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;margin-bottom:.875rem;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sh{padding:.75rem 1.125rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:.625rem}
.sn{background:var(--or);color:#fff;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.68rem;font-weight:700;flex-shrink:0}
.st{font-weight:700;font-size:.85rem;color:var(--g800)}
.si{margin-left:auto;font-size:.63rem;color:var(--g400);font-family:'JetBrains Mono',monospace;background:var(--g100);padding:.1rem .45rem;border-radius:3px}
.sb2{padding:1.125rem}
.alr{border-radius:var(--rs);padding:.625rem .875rem;margin-bottom:.875rem;font-size:.77rem;line-height:1.6;display:flex;gap:.5rem}
.alr-i{flex-shrink:0;margin-top:.05rem}
.alr.info{background:var(--blbg);border:1px solid var(--blbd);color:#1e40af}
.alr.warning{background:var(--yebg);border:1px solid var(--yebd);color:#92400e}
.alr.danger{background:var(--rebg);border:1px solid var(--rebd);color:#991b1b}
.spe{background:var(--blbg);border-left:3px solid var(--bl);border-radius:0 var(--rs) var(--rs) 0;padding:.7rem .9rem;margin-bottom:1rem}
.spe-l{display:inline-flex;align-items:center;gap:.25rem;background:var(--bl);color:#fff;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.1rem .45rem;border-radius:3px;margin-bottom:.3rem}
.spe-t{font-size:.79rem;color:#1e40af;font-style:italic;line-height:1.65}
.slbl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem}
.slbl::after{content:'';flex:1;height:1px;background:var(--g100)}
.olist{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:.5rem;padding:.525rem .75rem;border:1px solid var(--g200);border-radius:var(--rs);cursor:pointer;transition:.1s;background:#fff;user-select:none}
.opt:hover{border-color:var(--orbd);background:var(--orbg)}
.opt.sel{border-color:var(--or);background:var(--orbg)}
.ocb{width:15px;height:15px;border:1.5px solid var(--g300);border-radius:3px;flex-shrink:0;display:grid;place-items:center;transition:.1s;margin-top:.15rem}
.opt.sel .ocb{background:var(--or);border-color:var(--or)}
.ochk{display:none;color:#fff;font-size:.58rem;font-weight:800}
.opt.sel .ochk{display:block}
.ot{font-size:.79rem;color:var(--g700);line-height:1.4}
.opt.sel .ot{color:var(--g900);font-weight:500}
.os{font-size:.67rem;color:var(--g400);margin-top:.06rem;font-family:'JetBrains Mono',monospace}
.opt.sel .os{color:var(--or)}
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;margin-bottom:.875rem}
.vit{border:1px solid var(--g200);border-radius:6px;padding:.4rem .35rem;text-align:center;background:#fff}
.vn{font-size:.6rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.22rem}
.vsel{width:100%;border:1px solid var(--g200);border-radius:4px;padding:.2rem .25rem;font-size:.68rem;font-family:inherit;background:var(--g50);color:var(--g700);cursor:pointer;outline:none}
.vsel:focus{border-color:var(--or)}
.clf{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:.8rem 1rem;margin-bottom:.875rem}
.clf-t{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g600);margin-bottom:.625rem}
.fr{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fr:last-child{margin-bottom:0}
.fl{font-size:.71rem;font-weight:600;color:var(--g600);flex:0 0 170px;padding-top:.4rem;line-height:1.35}
.fl.req::after{content:' *';color:var(--re)}
.fi,.fsl,.fta{flex:1;border:1px solid var(--g200);border-radius:5px;padding:.35rem .55rem;font-size:.77rem;font-family:inherit;color:var(--g800);background:#fff;transition:.1s;outline:none}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(255,102,0,.08)}
.fta{min-height:46px;resize:vertical;line-height:1.5}
.navbtns{display:flex;gap:.5rem;margin-top:1rem}
.btn{padding:.475rem 1.1rem;border-radius:var(--rs);border:none;font-family:inherit;font-size:.79rem;font-weight:600;cursor:pointer;transition:.1s;display:inline-flex;align-items:center;gap:.3rem}
.btn-p{background:var(--or);color:#fff}
.btn-p:hover{background:var(--orh)}
.btn-s{background:#fff;color:var(--g600);border:1px solid var(--g200)}
.btn-s:hover{border-color:var(--g300);color:var(--g800)}
.btn:disabled{opacity:.3;cursor:not-allowed}
/* ── RÉSULTAT FINAL ── */
.final{display:none}
.fh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.fht{font-weight:700;font-size:.95rem;color:var(--g800)}
.bcopy{background:var(--or);color:#fff;border:none;padding:.4rem .875rem;border-radius:var(--rs);font-family:inherit;font-size:.75rem;font-weight:700;cursor:pointer;transition:.1s}
.bcopy:hover{background:var(--orh)}
.bcopy.ok{background:var(--gn)}
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.875rem}
.sc2{background:#fff;border:1px solid var(--g200);border-radius:var(--rs);padding:.65rem .875rem}
.sc2-l{font-size:.63rem;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.18rem}
.sc2-v{font-weight:700;font-size:.82rem;color:var(--g800)}
.sc2-v.or{color:var(--or)}.sc2-v.gn{color:var(--gn)}.sc2-v.bl{color:var(--bl)}
.crmo{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:1.125rem;font-family:'JetBrains Mono',monospace;font-size:.71rem;line-height:1.85;color:var(--g600);white-space:pre-wrap;word-break:break-word}
.crmo .H1{color:var(--or);font-weight:700}
.crmo .H2{color:var(--bl);font-weight:600}
.crmo .V{color:var(--gn)}
.crmo .A{color:var(--or);font-weight:700}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:500;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mbox{background:#fff;border-radius:var(--r);padding:1.75rem;text-align:center;max-width:320px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,.1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo" onclick="goPage('home')">
    <div class="lmark">📡</div>
    <div class="lname">MyProcess <span>FTTH</span></div>
  </div>
  <div class="hsep"></div>
  <div class="hbadge" id="hbadge">Accueil</div>
  <div class="hclock" id="clock">--:--:--</div>
</header>

<div class="wrap">
  <nav class="sb">
    <div class="sb-sec">Principal</div>
    <div class="ni on" id="nav-home" onclick="goPage('home')"><span class="ni-ic">🏠</span>Accueil</div>
    <div class="ni" id="nav-delais" onclick="goPage('delais')"><span class="ni-ic">⏱</span>Délais & Files</div>
    <div class="ni" id="nav-diag" onclick="goPage('diag')"><span class="ni-ic">🔬</span>Diagnostic guidé</div>
    <hr class="sd">
    <div class="sb-sec">Référence rapide</div>
    <div class="ni" id="nav-voyants" onclick="goPage('voyants')"><span class="ni-ic">💡</span>Voyants</div>
    <div class="ni" id="nav-checklist" onclick="goPage('checklist')"><span class="ni-ic">📋</span>Checklists CRM</div>
    <div class="ni" id="nav-codes" onclick="goPage('codes')"><span class="ni-ic">🖥</span>Codes Papyrus</div>
  </nav>

  <main class="main" id="main"></main>
</div>

<div class="mbg" id="mc">
  <div class="mbox">
    <div style="font-size:2rem;margin-bottom:.5rem">✅</div>
    <div style="font-weight:700;font-size:.95rem;color:var(--g800);margin-bottom:.3rem">Checklist copiée !</div>
    <div style="font-size:.8rem;color:var(--g500);margin-bottom:1rem">Collez dans le CRM avec <strong>Ctrl+V</strong></div>
    <button class="btn btn-p" onclick="document.getElementById('mc').classList.remove('show')">Fermer</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
var PAGES=['home','delais','diag','voyants','checklist','codes'];
var BADGES={home:'Accueil',delais:'Délais & Files',diag:'Diagnostic guidé',voyants:'Référence Voyants',checklist:'Checklists CRM',codes:'Codes Papyrus'};

function goPage(p){
  PAGES.forEach(function(x){
    var el=document.getElementById('nav-'+x);
    if(el) el.classList.toggle('on',x===p);
  });
  document.getElementById('hbadge').textContent=BADGES[p]||p;
  var fn={'home':renderHome,'delais':renderDelais,'diag':renderDiag,'voyants':renderVoyants,'checklist':renderChecklist,'codes':renderCodes};
  if(fn[p]) fn[p]();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════
// PAGE — ACCUEIL
// ═══════════════════════════════════════════════
function renderHome(){
  document.getElementById('main').innerHTML=`

function showCL(idx){
  var s=window._clData[idx];
  document.querySelectorAll('[id^=clb]').forEach(function(b,i){
    b.style.background=i===idx?'var(--orbg)':'#fff';
    b.style.borderColor=i===idx?'var(--or)':'var(--g200)';
    b.style.color=i===idx?'var(--or)':'var(--g600)';
  });
  var h=`<div class="clf" style="background:#fff;border:1px solid var(--g200)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <div style="font-weight:700;font-size:.82rem;color:var(--g800)">${s.t}</div>
      <button onclick="copyCL()" class="bcopy">📋 Copier</button>
    </div>
    <div id="cl-fields">`;
  s.f.forEach(function(f,i){
    h+=`<div class="fr"><div class="fl">${f}</div><input class="fi" id="clf${i}" type="text" placeholder=""></div>`;
  });
  h+=`</div></div>`;
  document.getElementById('cl-area').innerHTML=h;
  window._clFields=s.f;
}

function copyCL(){
  var lines=[window._clData[document.querySelectorAll('[id^=clb]').length-1]?.t||'Checklist FTTH'];
  // Get title from active button
  var active=document.querySelector('[id^=clb][style*="orbg"]');
  var title=active?active.textContent:'Checklist';
  var txt='=== '+title+' ===\n';
  window._clFields.forEach(function(f,i){
    var v=document.getElementById('clf'+i)?.value||'';
    txt+=f+(v?' '+v:'')+'\n';
  });
  copyText(txt);
}

function startFlow(fid){
  FL=FD[fid]; SI=0; D={_fid:fid,_flbl:FL.label};
  FL.steps.forEach(function(s){
    D[s.id+'_opts']=[];
    if(s.fields) s.fields.forEach(function(f){D[f.k]=''});
    if(s.voy) Object.keys(s.voy).forEach(function(g){s.voy[g].forEach(function(v){D['v_'+g+'_'+v]='—'})});
  });
  goPage('diag');
}

function renderDiagFlow(){
  var m=document.getElementById('main');
  var t=FL.steps.length, pct=Math.round(((SI+1)/t)*100);
  var ph=`<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem">
    <div><div class="ph-title">${FL.label}</div><div class="ph-sub">Étape ${SI+1}/${t}</div></div>
    <button class="btn btn-s" onclick="FL=null;renderDiag()">↺ Changer</button>
  </div>`;
  var prog=`<div class="prog-wrap show">
    <div class="pm"><span class="pl">${FL.steps[SI].title}</span><span class="pp">${pct}%</span></div>
    <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
    <div class="pdots">${Array.from({length:t},(_,i)=>'<div class="pdot'+(i<SI?' done':i===SI?' cur':'')+'"></div>').join('')}</div>
  </div>`;
  var step=FL.steps[SI];
  var sc=`<div class="step-card"><div class="sh"><div class="sn">${SI+1}</div><div class="st">${step.title}</div><div class="si">${step.infra}</div></div><div class="sb2">`;
  if(step.alert) sc+=`<div class="alr ${step.alert.t}"><span class="alr-i">${step.alert.i}</span><span>${step.alert.tx}</span></div>`;
  if(step.speech) sc+=`<div class="spe"><div class="spe-l">🗣 Script</div><div class="spe-t">${step.speech}</div></div>`;
  if(step.voy){
    Object.keys(step.voy).forEach(function(g){
      sc+=`<div class="slbl">${g} — Voyants</div><div class="vgrid">`;
      step.voy[g].forEach(function(v){
        var k='v_'+g+'_'+v, cur=D[k]||'—';
        sc+=`<div class="vit"><div class="vn">${v}</div><select class="vsel" onchange="D['${k}']=this.value">`;
        ['—','Allumé fixe','Clignotant','Éteint','Rouge'].forEach(function(o){sc+=`<option${cur===o?' selected':''}>${o}</option>`});
        sc+=`</select></div>`;
      });
      sc+=`</div>`;
    });
  }
  if(step.opts&&step.opts.length){
    sc+=`<div class="slbl">Observations</div><div class="olist">`;
    step.opts.forEach(function(o){
      var sel=(D[step.id+'_opts']||[]).includes(o.l);
      sc+=`<div class="opt${sel?' sel':''}" onclick="togO('${step.id}','${o.l.replace(/'/g,"\\'").replace(/"/g,"&quot;")}',this)"><div class="ocb"><span class="ochk">✓</span></div><div><div class="ot">${o.l}</div>${o.s?`<div class="os">${o.s}</div>`:''}</div></div>`;
    });
    sc+=`</div>`;
  }
  if(step.fields&&step.fields.length){
    sc+=`<div class="clf"><div class="clf-t">📋 Checklist CRM à remplir</div>`;
    step.fields.forEach(function(f){
      var v=D[f.k]||'';
      sc+=`<div class="fr"><div class="fl${f.req?' req':''}">${f.l}</div>`;
      if(f.t==='ta') sc+=`<textarea class="fta" placeholder="${f.p||''}" onchange="D['${f.k}']=this.value" oninput="D['${f.k}']=this.value">${v}</textarea>`;
      else if(f.t==='sel'){sc+=`<select class="fsl" onchange="D['${f.k}']=this.value">`;(f.o||[]).forEach(function(o){sc+=`<option value="${o}"${v===o?' selected':''}>${o}</option>`});sc+=`</select>`;}
      else sc+=`<input class="fi" type="text" placeholder="${f.p||''}" value="${v}" oninput="D['${f.k}']=this.value">`;
      sc+=`</div>`;
    });
    sc+=`</div>`;
  }
  sc+=`</div></div>`;
  var nav=`<div class="navbtns">
    <button class="btn btn-s" onclick="prevStep()" ${SI===0?'disabled':''}>← Précédent</button>
    <button class="btn btn-p" onclick="nextStep()">${SI===FL.steps.length-1?'✓ Terminer':'Suivant →'}</button>
  </div>`;
  m.innerHTML=ph+prog+sc+nav;
}

function togO(sid,lbl,el){
  var k=sid+'_opts'; if(!D[k])D[k]=[];
  var i=D[k].indexOf(lbl);
  if(i===-1)D[k].push(lbl); else D[k].splice(i,1);
  el.classList.toggle('sel');
  el.querySelector('.ocb').innerHTML=D[k].includes(lbl)?'<span class="ochk">✓</span>':'';
}
function nextStep(){if(SI===FL.steps.length-1)showFinal();else{SI++;renderDiagFlow();window.scrollTo({top:0,behavior:'smooth'})}}
function prevStep(){if(SI>0){SI--;renderDiagFlow();window.scrollTo({top:0,behavior:'smooth'})}}

function showFinal(){
  var act=getAct(), fil=getFil(), del=getDel();
  var now=new Date();
  var crm='=== DIAGNOSTIC FTTH — '+now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+' ===\n';
  crm+='Problématique : '+D._flbl+'\n\n';
  FL.steps.forEach(function(s,i){
    crm+='── ÉTAPE '+(i+1)+' : '+s.title.toUpperCase()+' ──\n';
    (D[s.id+'_opts']||[]).forEach(function(o){crm+='  ✓ '+o+'\n'});
    if(s.voy) Object.keys(s.voy).forEach(function(g){s.voy[g].forEach(function(v){var val=D['v_'+g+'_'+v];if(val&&val!=='—')crm+='  '+g+' '+v+' : '+val+'\n'})});
    if(s.fields) s.fields.forEach(function(f){if(D[f.k])crm+='  '+(f.l)+' : '+D[f.k]+'\n'});
    crm+='\n';
  });
  crm+='═══════════════════════════\n';
  crm+='ACTION : '+act+'\n';
  if(fil) crm+='FILE   : '+fil+'\n';
  crm+='DÉLAI  : '+del+'\n';
  var tc=D['titre']||D['titre_case']||''; if(tc) crm+='CASE   : '+tc+'\n';
  var st=D['statut']||''; if(st) crm+='STATUT : '+st+'\n';
  D._crm=crm;
  var html=crm
    .replace(/=== .* ===/g,function(m){return'<span class="H1">'+m+'</span>'})
    .replace(/── .* ──/g,function(m){return'<span class="H2">'+m+'</span>'})
    .replace(/^(ACTION|FILE|DÉLAI|CASE|STATUT)/gm,function(m){return'<span class="A">'+m+'</span>'})
    .replace(/  ✓ .*/g,function(m){return'<span class="V">'+m+'</span>'})
    .replace(/═+/g,function(m){return'<span class="H2">'+m+'</span>'});
  var m=document.getElementById('main');
  m.innerHTML=`
<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem">
  <div><div class="ph-title">${FL.label}</div><div class="ph-sub">Diagnostic terminé</div></div>
  <button class="btn btn-s" onclick="FL=null;renderDiag()">↺ Nouveau</button>
</div>
<div class="sumrow">
  <div class="sc2"><div class="sc2-l">Action</div><div class="sc2-v or">${act}</div></div>
  <div class="sc2"><div class="sc2-l">File</div><div class="sc2-v bl">${fil||'—'}</div></div>
  <div class="sc2"><div class="sc2-l">Délai</div><div class="sc2-v ${del.includes('Clôturé')?'gn':'bl'}">${del}</div></div>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
  <div style="font-weight:700;font-size:.85rem;color:var(--g800)">📋 Checklist à coller dans le CRM</div>
  <button class="bcopy" id="bc" onclick="doCopy()">📋 Copier</button>
</div>
<div class="crmo">${html}</div>`;
}

function getAct(){
  var a=D['action']||D['action_f']||'';
  if(a) return a;
  var all=[]; FL.steps.forEach(function(s){(D[s.id+'_opts']||[]).forEach(function(o){all.push(o)})});
  if(all.some(function(o){return/rétabli|résolu|clôtur/i.test(o)})) return 'Clôture N1';
  if(all.some(function(o){return/DTF/i.test(o)})) return 'Escalade DTF';
  if(all.some(function(o){return/OI|Partage FTTH N3/i.test(o)})) return 'Escalade OI';
  if(all.some(function(o){return/NOC/i.test(o)})) return 'NOC FIXE B2C';
  if(all.some(function(o){return/LDF/i.test(o)})) return 'Escalade LDF';
  if(all.some(function(o){return/BU Fixe/i.test(o)})) return 'BU Fixe B2C';
  return 'À qualifier';
}
function getFil(){
  var f=D['file']||D['file_case']||'';
  if(f&&f!=='File par défaut') return f;
  var a=getAct();
  if(/Clôture/.test(a)) return 'File par défaut';
  if(/DTF/.test(a)&&D._fid==='orange_acces') return 'BO ST FTTH B2C → DTF';
  if(/DTF/.test(a)) return 'BO ST FTTH B2C → DTF_FTTH_OUT';
  if(/OI/.test(a)) return 'BO ST FTTH B2C → Partage FTTH N3';
  if(/NOC/.test(a)) return 'BO ST FTTH B2C → NOC FIXE B2C';
  if(/LDF/.test(a)) return 'LDF'; if(/BU Fixe/.test(a)) return 'BU Fixe B2C';
  return '';
}
function getDel(){
  var a=getAct();
  if(/Clôture/.test(a)) return 'Clôturé';
  if(/DTF/.test(a)&&D._fid==='orange_acces') return '24h ouvrées';
  if(/DTF/.test(a)) return '24–48h ouvrées';
  if(/OI/.test(a)) return '48h ouvrées';
  if(/NOC/.test(a)) return 'Pas de délai';
  if(/LDF|BU Fixe/.test(a)) return '48h ouvrées';
  return 'À préciser';
}

function doCopy(){
  if(!D._crm) return;
  navigator.clipboard.writeText(D._crm).then(function(){
    var b=document.getElementById('bc');
    b.textContent='✓ Copié!';b.classList.add('ok');
    setTimeout(function(){b.textContent='📋 Copier';b.classList.remove('ok')},2500);
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=D._crm;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    document.getElementById('mc').classList.add('show');
  });
}

function copyText(txt){
  navigator.clipboard.writeText(txt).then(function(){
    document.getElementById('mc').classList.add('show');
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    document.getElementById('mc').classList.add('show');
  });
}
